# Development overlay — infra services only.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres redis minio mc prosody
#
# Exposes infra ports on localhost so the backend/frontend can run outside Docker
# via: pnpm --filter backend dev && pnpm --filter frontend dev
name: chatrix

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
